name: DevSecOps Pipeline 
on: 
  push: 
    branches: ["main"] 
jobs: 
  build: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout Code 
        uses: ac ons/checkout@v4 
      - name: Install Dependencies 
        run: npm install 
 
      - name: Run App 
        run: node app.js 
 
      - name: Run SAST (Semgrep) 
        run: | 
          pip install semgrep 
          semgrep --config=auto . || true 
 
      - name: Dependency Scan 
        run: npm audit || true 
 
      - name: Build Docker Image 
        run: docker build -t app . 
 
      - name: Scan Docker Image (Trivy) 
        uses: aquasecurity/trivy-ac on@master 
        with: 
          image-ref: 'app' 
          format: 'table' 
          exit-code: '0' 
 
      - name: Run DAST (OWASP ZAP) 
        run: | 
          docker run -t owasp/zap2docker-stable zap-baseline.py -t h p://example.com || true 
 
      - name: Deploy 
        run: echo "App deployed successfully"