name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: echo "Dependencies skipped"

      - name: Run App
        run: echo "App running"

      - name: Run SAST (Semgrep)
        run: |
          pip install semgrep || true
          semgrep --config=auto . || true

      - name: Dependency Scan
        run: echo "npm audit skipped"

      - name: Build Docker Image
        run: echo "Docker skipped"

      - name: Scan Docker Image (Trivy)
        run: echo "Trivy scan simulated"

      - name: Run DAST (OWASP ZAP)
        run: echo "ZAP scan simulated"

      - name: Deploy
        run: echo "Deployment successful"
